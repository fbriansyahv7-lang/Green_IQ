<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenIQ - Riwayat</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="brand-box">
            <div class="brand-logo"><i class="fas fa-leaf"></i></div>
            <div class="brand-text">
                <h2>GreenIQ</h2>
                <span style="font-size:11px; color:#6b7280;">Smart Farming AI</span>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="index.html" class="nav-link">
                <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="nav-link btn-rekomendasi">
                <i class="fas fa-seedling"></i> <span>Rekomendasi</span>
            </a>
            <a href="riwayat.html" class="nav-link active">
                <i class="fas fa-clipboard-list"></i> <span>Riwayat</span>
            </a>
            <a href="peta_kelembaban.html" class="nav-link">
                <i class="fas fa-map-marked-alt"></i> <span>Peta Tanah</span>
            </a>
            <div style="margin:20px 0 10px 10px; font-size:11px; font-weight:700; color:#9ca3af;">SYSTEM</div>
            <a href="#" class="nav-link">
                <i class="fas fa-cog"></i> <span>Pengaturan</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div style="display:flex; align-items:center; gap:15px;">
                <button class="menu-toggle" onclick="toggleSidebar()" style="background:none; border:none; font-size:20px; display:none;">
                    <i class="fas fa-bars"></i>
                </button>
                <div>
                    <h1 id="header-title" style="margin:0; font-size:20px;">Riwayat</h1>
                    <p style="margin:0; font-size:12px; color:#6b7280;">Riwayat analisis & pengecekan</p>
                </div>
            </div>
        </header>

        <div class="content-body">

            <section id="view-history" class="view-section active">
                <div class="card">
                    <div class="card-header-flex">
                        <h3>📂 Riwayat Analisis & Pengecekan</h3>
                        <button class="btn-detail" onclick="clearSavedHistory()" style="background:var(--danger); color:white;">Hapus Semua</button>
                    </div>
                    <div id="saved-history-container" class="history-wrapper"></div>
                    <p id="empty-history-msg" style="text-align:center; color:#6b7280; margin-top:15px; display:none;">
                        Belum ada riwayat tersimpan.
                    </p>
                </div>
            </section>

        </div>
    </main>
</div>

<script src="/script.js" defer></script>
</body>
</html>
